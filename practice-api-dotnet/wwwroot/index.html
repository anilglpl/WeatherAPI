<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practice API Web App</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; background: #f7f9fc; color: #111; }
    .container { max-width: 780px; margin: 0 auto; background: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 12px 30px rgba(35,50,80,0.12); }
    h1 { margin-top: 0; }
    button { background: #0b5fff; color: #fff; border: none; padding: 0.8rem 1.2rem; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #0947d1; }
    pre { background: #f4f6fa; padding: 1rem; border-radius: 10px; overflow-x: auto; }
    .status { margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Practice API Web App</h1>
    <p>This is a simple UI layer for your .NET Web API. Click the button to request the API and display the JSON response.</p>

    <button id="loadButton">Load weather forecast</button>
    <div class="status" id="status"></div>
    <pre id="output">Press the button to call <code>/weatherforecast</code>.</pre>
  </div>

  <script>
    const button = document.getElementById('loadButton');
    const output = document.getElementById('output');
    const status = document.getElementById('status');

    button.addEventListener('click', async () => {
      status.textContent = 'Loading...';
      output.textContent = '';

      try {
        const response = await fetch('/weatherforecast');
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const data = await response.json();
        output.textContent = JSON.stringify(data, null, 2);
        status.textContent = `Loaded ${data.length} forecast entries.`;
      } catch (error) {
        status.textContent = 'Failed to load data.';
        output.textContent = error.toString();
      }
    });
  </script>
</body>
</html>
